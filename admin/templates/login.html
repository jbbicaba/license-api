{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; text-align: center;">
    <h1>🔐 Connexion administration</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" style="background: #1e293b; padding: 30px; border-radius: 12px;">
        <input type="password" name="password" placeholder="Mot de passe" required style="margin-bottom: 20px;">
        <button type="submit">Se connecter</button>
    </form>
</div>
{% endblock %}
