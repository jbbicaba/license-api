<!DOCTYPE html>
<html>
<head>
    <title>Administration des licences</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .navbar {
            background: #0f172a;
            padding: 10px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .navbar a {
            color: #cbd5e1;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .navbar a:hover {
            background: #1e293b;
            color: white;
        }
        .navbar .right {
            margin-left: auto;
        }
        h1, h2 {
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0f172a;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th {
            background: #1e293b;
            color: #94a3b8;
            font-weight: 600;
        }
        tr:hover {
            background: #1e293b;
        }
        .btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #2563eb;
        }
        .btn-sm {
            padding: 4px 8px;
            font-size: 12px;
        }
        .btn-warning {
            background: #f59e0b;
        }
        .btn-warning:hover {
            background: #d97706;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .error {
            color: #ef4444;
            background: #1e293b;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        input, textarea, select {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        form {
            max-width: 400px;
            margin: 0 auto;
        }
        button[type="submit"] {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button[type="submit"]:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/keys">Gestion clé produit</a>
        <a href="/admin/logout" class="right">Déconnexion</a>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
